<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paiement réussi — FlowPoint</title>

  <meta name="color-scheme" content="light dark"/>

  <link rel="icon" type="image/svg+xml" href="/assets/flowpoint-logo.svg" />
  <link rel="shortcut icon" href="/assets/flowpoint-logo.svg" />

  <link rel="stylesheet" href="/style.css" />

  <style>
    .centerBox{
      max-width:760px;
      margin:56px auto;
    }

    .actionsRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .actionsRow .primaryBtn,
    .actionsRow .ghostBtn{
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    @media (max-width:640px){
      .centerBox{
        margin:28px auto;
      }

      .actionsRow{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="centerBox">
      <div class="hero">
        <h1>Paiement réussi ✅</h1>
        <p id="msg">Redirection en cours vers ton espace FlowPoint…</p>
      </div>

      <div class="card" style="margin-top:12px">
        <div class="cardBody">
          <div class="small">
            Ton paiement a bien été validé. Ton plan ou tes options sont en cours de synchronisation.
          </div>

          <div class="actionsRow">
            <a class="primaryBtn" href="/dashboard.html">Dashboard</a>
            <a class="ghostBtn" href="/pricing.html">Pricing</a>
          </div>

          <div class="small">
            Tu vas être redirigé automatiquement dans quelques instants.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "/dashboard.html";
    setTimeout(() => location.href = next, 900);
  </script>
</body>
</html>
