<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paiement annulé — FlowPoint</title>
  <meta name="color-scheme" content="light dark"/>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <div class="hero" style="max-width:720px; margin:40px auto;">
      <h1>Paiement annulé</h1>
      <p id="msg">Tu peux réessayer depuis le pricing.</p>

      <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
        <a class="primaryBtn" href="/pricing.html">Retour au pricing</a>
        <a class="ghostBtn" href="/dashboard.html">Dashboard</a>
      </div>

      <p class="small" style="margin-top:16px;" id="auto"></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "/pricing.html";
    const auto = document.getElementById("auto");
    if (auto) auto.textContent = "Redirection automatique…";

    setTimeout(() => {
      location.href = next;
    }, 1200);
  </script>
</body>
</html>
