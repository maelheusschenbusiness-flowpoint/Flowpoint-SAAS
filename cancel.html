<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paiement annulé — FlowPoint</title>

  <meta name="color-scheme" content="light dark"/>

  <link rel="icon" type="image/svg+xml" href="/assets/flowpoint-logo.svg" />
  <link rel="shortcut icon" href="/assets/flowpoint-logo.svg" />

  <link rel="stylesheet" href="/style.css" />

  <style>
    .centerBox{
      max-width:760px;
      margin:56px auto;
    }

    .actionsRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .actionsRow .primaryBtn,
    .actionsRow .ghostBtn{
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    @media (max-width:640px){
      .centerBox{
        margin:28px auto;
      }

      .actionsRow{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="centerBox">
      <div class="hero">
        <h1>Paiement annulé</h1>
        <p>Tu peux réessayer plus tard ou revenir sur la page pricing.</p>
      </div>

      <div class="card" style="margin-top:12px">
        <div class="cardBody">
          <div class="small">
            Aucun paiement n’a été validé. Ton abonnement actuel n’a pas été modifié.
          </div>

          <div class="actionsRow">
            <a class="primaryBtn" href="/pricing.html">Retour au pricing</a>
            <a class="ghostBtn" href="/dashboard.html">Dashboard</a>
          </div>

          <div class="small">
            Tu peux relancer le checkout quand tu veux depuis la page des offres ou des add-ons.
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
