      <stop stop-color="#2F6BFF"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#g)"/>
  <!-- lightning -->
  <path d="M34.5 14L22 36.5h10.2L28.7 50 43 28.5H32.8L34.5 14Z"
        fill="#fff" opacity="0.98"/>
