<!doctype html>
<html lang="fr">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FlowPoint — Connexion</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f7fb;
--card:rgba(255,255,255,.92);
--text:#0f172a;
--muted:#667085;
--border:#e6eaf2;
--primary:#2f5bff;
--danger:#b00020;
--shadow:0 16px 60px rgba(16,24,40,.10);
--r:18px;
}

@media (prefers-color-scheme: dark){
:root{
--bg:#070b18;
--card:rgba(14,18,40,.78);
--text:#eaf0ff;
--muted:rgba(234,240,255,.72);
--border:rgba(255,255,255,.10);
}
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,-apple-system;
background:var(--bg);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:var(--text);
}

.card{
width:100%;
max-width:500px;
background:var(--card);
border:1px solid var(--border);
border-radius:var(--r);
padding:22px;
box-shadow:var(--shadow);
}

h1{
margin:0 0 10px;
font-size:22px;
}

label{
display:block;
margin-top:14px;
font-weight:600;
font-size:13px;
}

input,button{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--border);
margin-top:6px;
font-size:14px;
}

button{
background:linear-gradient(180deg,var(--primary),#2449ff);
color:white;
border:none;
font-weight:700;
cursor:pointer;
margin-top:14px;
}

.msg{
margin-top:12px;
font-size:14px;
}

.links{
margin-top:14px;
}

.links a{
text-decoration:none;
color:var(--primary);
font-weight:600;
margin-right:10px;
}

</style>

</head>

<body>

<div class="card">

<h1>Connexion</h1>

<label>Email</label>

<input id="email" type="email" placeholder="email@entreprise.com">

<button id="btn">
Recevoir le lien
</button>

<div id="msg" class="msg"></div>

<div class="links">
<a href="/index.html">Créer un compte</a>
<a href="/pricing.html">Voir les offres</a>
</div>

</div>

<script>

const btn=document.getElementById("btn")
const email=document.getElementById("email")
const msg=document.getElementById("msg")

btn.onclick=async()=>{

const value=email.value.trim()

if(!value){
msg.innerText="Email requis"
return
}

btn.disabled=true
msg.innerText="Envoi..."

try{

const r=await fetch("/api/auth/login-request",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({email:value})
})

const j=await r.json()

if(!r.ok) throw new Error(j.error)

msg.innerText="Lien envoyé"

}catch(e){

msg.innerText=e.message

}

btn.disabled=false

}

</script>

</body>
</html>
