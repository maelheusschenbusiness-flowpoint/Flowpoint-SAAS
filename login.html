<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FlowPoint — Connexion</title>

  <link rel="icon" type="image/svg+xml" href="/assets/flowpoint-logo.svg" />
  <link rel="shortcut icon" href="/assets/flowpoint-logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="/login.js"></script>
</head>

<body>
  <div class="card">
    <div class="brandRow">
      <img class="brandLogo" src="/assets/flowpoint-logo.svg" alt="FlowPoint">
      <div style="color:var(--muted);font-size:13px;font-weight:600">
        Connexion sécurisée (sans mot de passe)
      </div>
    </div>

    <h1>Connexion</h1>
    <p>Entre ton email : on t’envoie un lien de connexion.</p>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="toi@entreprise.com" autocomplete="email" />

    <button id="btn">Recevoir le lien</button>

    <div id="msg" class="msg">—</div>

    <div class="links">
      <a class="link" href="/index.html">Créer un compte</a>
      <a class="link" href="/pricing.html">Voir les offres</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById("btn");
    const emailEl = document.getElementById("email");
    const msg = document.getElementById("msg");

    function setMsg(t, type){
      msg.textContent = t || "";
      msg.classList.remove("ok","danger");
      if(type) msg.classList.add(type);
    }

    btn.addEventListener("click", async () => {
      const email = String(emailEl.value || "").trim();
      if(!email) return setMsg("Email requis.", "danger");

      btn.disabled = true;
      setMsg("Envoi…");

      try{
        const r = await fetch("/api/auth/login-request", {
          method:"POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ email })
        });
        const j = await r.json().catch(()=> ({}));
        if(!r.ok) throw new Error(j.error || "Erreur");

        if(j.debugLink){
          setMsg("✅ Lien généré (mode debug). Regarde la console.", "ok");
          console.log("DEBUG LOGIN LINK:", j.debugLink);
        } else {
          setMsg("✅ Lien envoyé. Vérifie ton email.", "ok");
        }
      }catch(e){
        setMsg(e.message || "Erreur", "danger");
      }finally{
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
