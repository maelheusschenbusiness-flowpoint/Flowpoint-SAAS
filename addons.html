<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Add-ons — FlowPoint</title>
  <meta name="color-scheme" content="light dark"/>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logoBox">
        <img class="brandLogo" src="/assets/flowpoint-logo.svg" alt="FlowPoint"
             onerror="this.src='/assets/flowpoint-logo.png'">
      </div>
      <div class="actions">
        <a class="linkBtn" href="/pricing.html">← Retour pricing</a>
        <div class="pill" id="authPill">Statut : …</div>
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="hero">
          <h1>Gérer mes add-ons</h1>
          <p>Ici tu ajoutes/supprimes des options. Ça s’applique à ton abonnement existant.</p>
        </div>

        <div class="section">
          <div class="sectionHead">
            <div class="title">Add-ons</div>
            <div class="hint">FlowPoint UI → applique sur Stripe (subscription update).</div>
          </div>

          <div class="card" style="margin-top:12px">
            <div class="cardBody">
              <div id="addonsMsg" class="small"></div>
              <div id="addonsList"></div>

              <div style="height:10px"></div>
              <button class="primaryBtn" id="applyBtn">Appliquer</button>
              <button class="ghostBtn" id="toPayBtn" style="display:none">Payer maintenant</button>
            </div>
          </div>
        </div>
      </div>

      <div class="side">
        <div class="card">
          <div class="cardHead">Résumé</div>
          <div class="cardBody">
            <div class="row2"><span class="muted">Add-ons</span> <span id="sumAddOns">—</span></div>
            <div class="small" style="margin-top:10px">
              • Si un prorata est généré, tu payeras via /checkout.html.<br/>
              • White label est forcé ON.
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="/addons.js"></script>
</body>
</html>
