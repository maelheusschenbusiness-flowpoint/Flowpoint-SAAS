<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Invitation — FlowPoint</title>

  <meta name="color-scheme" content="light dark"/>

  <link rel="icon" type="image/svg+xml" href="/assets/flowpoint-logo.svg"/>
  <link rel="shortcut icon" href="/assets/flowpoint-logo.svg"/>

  <link rel="stylesheet" href="/style.css"/>

  <style>
    .centerBox{
      max-width:520px;
      margin:60px auto;
    }

    .field{
      margin-top:12px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      font-weight:800;
      color:var(--text);
    }

    .input{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--inputBorder);
      background:var(--inputBg);
      color:var(--text);
      box-sizing:border-box;
      font:inherit;
      outline:none;
    }

    .input::placeholder{
      color:var(--muted);
      opacity:.85;
    }

    .input:focus{
      border-color:rgba(47,91,255,.55);
      box-shadow:0 0 0 4px rgba(47,91,255,.12);
    }

    .msg{
      margin-top:10px;
      font-size:14px;
      line-height:1.45;
    }

    .error{
      color:#ff6b6b;
      font-weight:700;
    }

    .ok{
      color:#4cff8d;
      font-weight:700;
    }

    @media (prefers-color-scheme: light){
      .centerBox .card{
        background:rgba(255,255,255,.96);
      }

      .input{
        background:#ffffff;
        border:1px solid #d9deea;
        color:#0f172a;
      }

      .input::placeholder{
        color:#667085;
        opacity:.9;
      }
    }

    @media (max-width:640px){
      .centerBox{
        margin:28px auto;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="centerBox">

      <div class="hero">
        <h1>Rejoindre l’équipe</h1>
        <p>Entre ton email invité et ton nom pour accepter l’invitation.</p>
      </div>

      <div class="card" style="margin-top:12px">
        <div class="cardBody">

          <div class="field">
            <label for="name">Nom</label>
            <input
              id="name"
              class="input"
              type="text"
              placeholder="Nom (optionnel)"
              autocomplete="name"
            />
          </div>

          <div class="field">
            <label for="email">Email invité</label>
            <input
              id="email"
              class="input"
              type="email"
              placeholder="Email invité"
              autocomplete="email"
              required
            />
          </div>

          <div style="height:12px"></div>

          <button class="primaryBtn" id="btn">
            Accepter l’invitation
          </button>

          <div id="msg" class="msg muted"></div>

        </div>
      </div>

    </div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    function setMsg(t, type = "") {
      msg.className = "msg " + (type === "error" ? "error" : type === "ok" ? "ok" : "muted");
      msg.textContent = t || "";
    }

    btn.addEventListener("click", async () => {
      const params = new URLSearchParams(location.search);
      const token = params.get("token");
      const email = document.getElementById("email").value.trim();
      const name = document.getElementById("name").value.trim();

      if (!token) return setMsg("Token manquant.", "error");
      if (!email) return setMsg("Email requis.", "error");

      btn.disabled = true;
      setMsg("Acceptation…");

      try {
        const r = await fetch("/api/org/invite/accept", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, email, name })
        });

        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || "Erreur");

        localStorage.setItem("fp_token", d.token);
        setMsg("✅ Invitation acceptée. Redirection…", "ok");
        setTimeout(() => location.href = "/dashboard.html", 800);
      } catch (e) {
        setMsg(e.message || "Erreur", "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
