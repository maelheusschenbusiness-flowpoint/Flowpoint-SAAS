<!doctype html>
<html lang="fr">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Invitation — FlowPoint</title>

<meta name="color-scheme" content="light dark"/>

<link rel="icon" type="image/svg+xml" href="/assets/flowpoint-logo.svg"/>
<link rel="shortcut icon" href="/assets/flowpoint-logo.svg"/>

<link rel="stylesheet" href="/style.css"/>

<style>

.centerBox{
max-width:520px;
margin:60px auto;
}

.input{
width:100%;
padding:12px 14px;
border-radius:12px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.05);
color:white;
margin-top:10px;
box-sizing:border-box;
}

.input::placeholder{
color:rgba(255,255,255,.5);
}

.msg{
margin-top:10px;
font-size:14px;
}

.error{color:#ff6b6b;font-weight:700}
.ok{color:#4cff8d;font-weight:700}

</style>

</head>

<body>

<div class="page">

<div class="centerBox">

<div class="hero">
<h1>Rejoindre l’équipe</h1>
<p>Entre ton email invité et ton nom pour accepter l’invitation.</p>
</div>

<div class="card" style="margin-top:12px">
<div class="cardBody">

<input id="name" class="input" placeholder="Nom (optionnel)"/>

<input id="email" class="input" type="email" placeholder="Email invité"/>

<div style="height:12px"></div>

<button class="primaryBtn" id="btn">
Accepter l’invitation
</button>

<div id="msg" class="msg muted"></div>

</div>
</div>

</div>

</div>

<script>

const msg = document.getElementById("msg");
const btn = document.getElementById("btn");

function setMsg(t,type=""){
msg.className="msg "+(type==="error"?"error":type==="ok"?"ok":"muted");
msg.textContent=t||"";
}

btn.addEventListener("click",async()=>{

const params=new URLSearchParams(location.search);
const token=params.get("token");

const email=document.getElementById("email").value.trim();
const name=document.getElementById("name").value.trim();

if(!token)return setMsg("Token manquant.","error");
if(!email)return setMsg("Email requis.","error");

btn.disabled=true;
setMsg("Acceptation…");

try{

const r=await fetch("/api/org/invite/accept",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token,email,name})
});

const d=await r.json().catch(()=>({}));

if(!r.ok)throw new Error(d.error||"Erreur");

localStorage.setItem("fp_token",d.token);

setMsg("✅ Invitation acceptée. Redirection…","ok");

setTimeout(()=>location.href="/dashboard.html",800);

}catch(e){

setMsg(e.message||"Erreur","error");

}finally{

btn.disabled=false;

}

});

</script>

</body>
</html>
