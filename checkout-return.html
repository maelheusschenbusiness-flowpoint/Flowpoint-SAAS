<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Retour Checkout — FlowPoint</title>
  <meta name="color-scheme" content="light dark"/>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <div class="hero" style="max-width:720px; margin:40px auto;">
      <h1>Finalisation…</h1>
      <p id="msg">Traitement en cours.</p>
    </div>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const sessionId = params.get("session_id");
      const status = (params.get("redirect_status") || "").toLowerCase();

      const msgEl = document.getElementById("msg");
      const setMsg = (t) => msgEl && (msgEl.textContent = t);

      // ✅ Cancel
      if (status === "canceled") {
        location.href = "/cancel.html?next=" + encodeURIComponent("/pricing.html");
        return;
      }

      // ✅ Failed
      if (status === "failed") {
        location.href = "/cancel.html?next=" + encodeURIComponent("/pricing.html");
        return;
      }

      // ✅ Succeeded => verify backend (met à jour entitlements + renvoie token)
      if (!sessionId) {
        location.href = "/pricing.html";
        return;
      }

      try {
        setMsg("Vérification du paiement…");

        const r = await fetch("/api/stripe/verify?session_id=" + encodeURIComponent(sessionId));
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j.error || "Erreur verify");

        // si ton backend renvoie un token, on le stocke
        if (j.token) {
          localStorage.setItem("token", j.token);
          localStorage.setItem("fp_token", j.token);
        }

        setMsg("✅ Paiement validé. Redirection…");
        location.href = "/dashboard.html";
      } catch (e) {
        setMsg("❌ " + (e.message || "Erreur"));
        // fallback
        setTimeout(() => (location.href = "/pricing.html"), 1200);
      }
    })();
  </script>
</body>
</html>
