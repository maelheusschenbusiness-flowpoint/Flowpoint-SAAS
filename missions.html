<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FlowPoint — Missions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./dashboard-shell.css" />

  <script>
    (function () {
      try {
        const tok = localStorage.getItem("token");
        if (!tok || tok.trim().length < 10) {
          window.location.replace("/login.html");
        }
      } catch (e) {
        window.location.replace("/login.html");
      }
    })();
  </script>
</head>
<body data-page="missions">
  <div class="fpOverlay" id="fpOverlay"></div>

  <div class="fpLayout">
    <aside class="fpSidebar" id="fpSidebar">
      <div class="fpSidebarTop">
        <a class="fpBrand" href="./overview.html" aria-label="FlowPoint">
          <span class="fpBrandMark">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M13 2c.4 0 .7.3.6.8L11.7 9H16c.6 0 .9.6.6 1L9.8 22c-.3.5-1.1.1-.9-.4l1.9-6.8H6.5c-.6 0-.9-.6-.6-1l6.5-11.5c.1-.2.4-.3.6-.3Z" fill="currentColor"/>
            </svg>
          </span>
          <span class="fpBrandText">
            <strong>FlowPoint</strong>
            <small>Client Dashboard</small>
          </span>
        </a>

        <button class="fpSidebarClose" id="fpSidebarClose" type="button" aria-label="Fermer le menu">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <nav class="fpNav">
        <a class="fpNavItem" data-page="overview" href="./overview.html"><span class="fpNavIcon">◫</span><span>Overview</span></a>
        <a class="fpNavItem" data-page="missions" href="./missions.html"><span class="fpNavIcon">✓</span><span>Missions</span></a>
        <a class="fpNavItem" data-page="audits" href="./audits.html"><span class="fpNavIcon">⌁</span><span>Audits</span></a>
        <a class="fpNavItem" data-page="monitors" href="./monitors.html"><span class="fpNavIcon">◎</span><span>Monitors</span></a>
        <a class="fpNavItem" data-page="reports" href="./reports.html"><span class="fpNavIcon">▤</span><span>Reports</span></a>
        <a class="fpNavItem" data-page="billing" href="./billing.html"><span class="fpNavIcon">€</span><span>Billing</span></a>
        <a class="fpNavItem" data-page="settings" href="./settings.html"><span class="fpNavIcon">⚙</span><span>Settings</span></a>
      </nav>

      <div class="fpSidebarCard">
        <div class="fpSidebarCardHead">
          <span class="fpSidebarLabel">Organisation</span>
          <span class="fpSidebarPlan" id="accPlan">—</span>
        </div>

        <div class="fpMiniList">
          <div class="fpMiniRow"><span>Org</span><strong id="accOrg">—</strong></div>
          <div class="fpMiniRow"><span>Role</span><strong id="accRole">—</strong></div>
          <div class="fpMiniRow"><span>Trial</span><strong id="accTrial">—</strong></div>
        </div>

        <div class="fpUsageBlock">
          <div class="fpUsageRow">
            <div class="fpUsageTop"><span>Audits</span><strong id="uAudits">—</strong></div>
            <div class="fpUsageBar"><span id="barAudits"></span></div>
          </div>

          <div class="fpUsageRow">
            <div class="fpUsageTop"><span>PDF</span><strong id="uPdf">—</strong></div>
            <div class="fpUsageBar"><span id="barPdf"></span></div>
          </div>

          <div class="fpUsageRow">
            <div class="fpUsageTop"><span>Exports</span><strong id="uExports">—</strong></div>
            <div class="fpUsageBar"><span id="barExports"></span></div>
          </div>

          <div class="fpUsageTop fpUsageFlat"><span>Monitors</span><strong id="uMonitors">—</strong></div>
        </div>

        <div class="fpSidebarActions">
          <button class="fpBtn fpBtnSoft" id="btnPortal" type="button">Billing Portal</button>
          <button class="fpBtn fpBtnDanger" id="btnLogout" type="button">Logout</button>
        </div>
      </div>
    </aside>

    <main class="fpMain">
      <header class="fpTopbar">
        <div class="fpTopbarLeft">
          <button class="fpMenuBtn" id="fpMenuBtn" type="button" aria-label="Ouvrir le menu">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>

          <div>
            <div class="fpEyebrow">FLOWPOINT</div>
            <h1 class="fpPageTitle" id="helloTitle">Bonjour, —</h1>
          </div>
        </div>

        <div class="fpTopbarRight">
          <div class="fpStatus">
            <span class="fpStatusDot" id="statusDot"></span>
            <span id="statusText">Chargement…</span>
          </div>
        </div>
      </header>

      <section class="fpPageIntro">
        <div>
          <h2 class="fpSectionTitle" id="pageTitle">Missions</h2>
          <p class="fpSectionText" id="pageDesc">Checklist d’actions importantes pour mettre FlowPoint en place proprement.</p>
        </div>

        <div class="fpSectionActions" id="pageActions"></div>
      </section>

      <section class="fpContentGrid" id="grid">
        <!-- rendu JS -->
      </section>
    </main>
  </div>

  <script src="./dashboard-shell.js"></script>
</body>
</html>
