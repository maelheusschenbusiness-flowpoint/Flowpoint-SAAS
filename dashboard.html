<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0a1230" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#dfe8ff" media="(prefers-color-scheme: light)" />
  <title>FlowPoint — Dashboard</title>

  <link rel="icon" type="image/svg+xml" href="/assets/flowpoint-logo.svg" />
  <link rel="shortcut icon" href="/assets/flowpoint-logo.svg" />
  <link rel="stylesheet" href="/dashboard.css" />

  <!-- OLD (kept for fallback) -->
  <link rel="stylesheet" href="/team-mobile-fixes.css" />
  <link rel="stylesheet" href="/team-chat-polish.css" />
  <link rel="stylesheet" href="/team-calendar-pro.css" />
  <link rel="stylesheet" href="/team-notes-members-polish.css" />

  <!-- NEW REBUILD -->
  <link rel="stylesheet" href="/team-workspace-rebuild.css" />
</head>
<body data-page="overview">
  <div class="fpOverlay" id="fpOverlay"></div>

  <div class="fpAppShell">
    <aside id="sidebar" class="fpSidebar">
      <div class="fpSidebarTop">
        <div class="fpBrand">
          <div class="fpBrandLogo">
            <img
              src="/assets/flowpoint-logo.svg"
              alt="FlowPoint"
              class="fpBrandLogoImg"
              id="fpSidebarLogo"
            />
          </div>

          <div class="fpBrandText">
            <div class="fpBrandName">FlowPoint</div>
            <div class="fpBrandSub">Centre de contrôle</div>
          </div>
        </div>

        <nav class="fpNav">
          <a href="#overview" class="fpNavItem" data-route="overview">
            <span class="fpNavDot"></span>
            <span>Overview</span>
          </a>

          <a href="#missions" class="fpNavItem" data-route="missions">
            <span class="fpNavDot"></span>
            <span>Missions</span>
          </a>

          <a href="#audits" class="fpNavItem" data-route="audits">
            <span class="fpNavDot"></span>
            <span>Audits</span>
          </a>

          <a href="#monitors" class="fpNavItem" data-route="monitors">
            <span class="fpNavDot"></span>
            <span>Monitors</span>
          </a>

          <a href="#reports" class="fpNavItem" data-route="reports">
            <span class="fpNavDot"></span>
            <span>Rapports</span>
          </a>

          <a href="#local-seo" class="fpNavItem" data-route="local-seo">
            <span class="fpNavDot"></span>
            <span>Local SEO</span>
          </a>

          <a href="#team" class="fpNavItem" data-route="team">
            <span class="fpNavDot"></span>
            <span>Équipe</span>
          </a>

          <a href="#billing" class="fpNavItem" data-route="billing">
            <span class="fpNavDot"></span>
            <span>Facturation</span>
          </a>

          <a href="#settings" class="fpNavItem" data-route="settings">
            <span class="fpNavDot"></span>
            <span>Paramètres</span>
          </a>
        </nav>
      </div>

      <div class="fpSidebarBottom">
        <div class="fpAccountCard" id="fpAccountCard">
          <div class="fpCardKicker">Compte</div>

          <div class="fpAccountRows">
            <div class="fpAccountRow">
              <span>Plan</span>
              <strong id="fpAccPlan">Plan non synchronisé</strong>
            </div>

            <div class="fpAccountRow">
              <span>Organisation</span>
              <strong id="fpAccOrg">Workspace principal</strong>
            </div>

            <div class="fpAccountRow">
              <span>Rôle</span>
              <strong id="fpAccRole">Owner</strong>
            </div>

            <div class="fpAccountRow">
              <span>Essai</span>
              <strong id="fpAccTrial">En vérification</strong>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <main class="fpMain">
      <header class="fpTopbar">
        <div class="fpTopbarLeft">
          <button id="fpMenuBtn" class="fpMenuBtn" type="button">
            <span></span><span></span><span></span>
          </button>
          <h1 class="fpHelloTitle">Dashboard</h1>
        </div>
      </header>

      <div class="fpPageWrap">
        <div id="fpPageContainer"></div>
      </div>
    </main>
  </div>

  <script src="/dashboard.js"></script>

  <!-- OLD -->
  <script src="/team-workspace.js"></script>
  <script src="/team-workspace-enhancements.js"></script>
  <script src="/team-calendar-pro.js"></script>
  <script src="/team-notes-members-polish.js"></script>

  <!-- NEW REBUILD (PRIORITY) -->
  <script src="/team-workspace-rebuild.js"></script>
</body>
</html>
