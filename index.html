<style>
  :root{
    --bg:#f6f7fb;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#667085;
    --border:#e6eaf2;
    --primary:#2f5bff;
    --shadow:0 10px 30px rgba(16,24,40,.06);
    --r:16px;
    color-scheme: light dark;
  }

  @media (prefers-color-scheme: dark){
    :root{
      --bg:#070b18;
      --card:rgba(12,18,40,.72);
      --text:#e8eeff;
      --muted:#aab7e1;
      --border:rgba(255,255,255,.10);
      --shadow:0 22px 90px rgba(0,0,0,.55);
    }
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    background:
      radial-gradient(1200px 700px at 15% 0%, rgba(47,91,255,.22), transparent 55%),
      radial-gradient(1200px 700px at 85% 0%, rgba(99,102,241,.20), transparent 55%),
      var(--bg);
    color:var(--text);
  }

  .wrap{max-width:860px;margin:44px auto;padding:0 16px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;}
  .brand h1{margin:0;font-size:26px;letter-spacing:-.02em;font-weight:800;}
  .brand .sub{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.45;}

  .links{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .link{
    color:var(--primary);
    font-weight:800;
    text-decoration:none;
    background:rgba(47,91,255,.10);
    border:1px solid rgba(47,91,255,.18);
    padding:9px 12px;border-radius:999px;
    white-space:nowrap;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--r);
    padding:20px;
    box-shadow:var(--shadow);
    backdrop-filter:saturate(180%) blur(12px);
  }

  .grid{display:grid;grid-template-columns: 1fr 1fr;gap:12px;}
  @media (max-width: 720px){ .grid{grid-template-columns:1fr;} }

  label{display:block;margin-top:12px;font-size:13px;font-weight:700;color:var(--text);}
  input,select,button{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(217,222,234,.9);
    margin-top:6px;
    background:rgba(255,255,255,.85);
    font-size:14px;
    outline:none;
    color:var(--text);
  }
  @media (prefers-color-scheme: dark){
    input,select{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
    }
  }

  input:focus,select:focus{border-color:rgba(47,91,255,.55); box-shadow:0 0 0 4px rgba(47,91,255,.12);}
  button{
    border:none;
    background:linear-gradient(180deg, var(--primary), #2449ff);
    color:#fff;
    font-weight:900;
    cursor:pointer;
    margin-top:14px;
  }
  button:disabled{opacity:.65;cursor:not-allowed;}
  #msg{margin-top:12px;font-size:14px;}
  .error{color:#b00020;font-weight:800;}
  .ok{color:#0a7a2f;font-weight:800;}
  .note{margin-top:10px;color:var(--muted);font-size:12.5px;line-height:1.45}
  .tiny{font-size:12px;color:var(--muted);margin-top:10px}
</style>
