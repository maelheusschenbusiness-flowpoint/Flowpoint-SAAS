<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowPoint — Essai 14 jours</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f7fb;
--card:rgba(255,255,255,.92);
--text:#0f172a;
--muted:#667085;
--border:#e6eaf2;
--primary:#2f5bff;
--shadow:0 10px 30px rgba(16,24,40,.06);
--r:16px;
}

@media (prefers-color-scheme: dark){
:root{
--bg:#070b18;
--card:rgba(12,18,40,.72);
--text:#e8eeff;
--muted:#aab7e1;
--border:rgba(255,255,255,.10);
}
}

body{
margin:0;
font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto;
background:
radial-gradient(1000px 600px at 10% 0%, rgba(47,91,255,.16), transparent 55%),
radial-gradient(1000px 600px at 90% 0%, rgba(99,102,241,.16), transparent 55%),
var(--bg);
color:var(--text);
}

.wrap{
max-width:860px;
margin:44px auto;
padding:0 16px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:14px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brandLogo{
width:44px;
height:44px;
border-radius:12px;
object-fit:contain;
filter:drop-shadow(0 10px 22px rgba(0,0,0,.22));
}

.brand h1{
margin:0;
font-size:26px;
font-weight:800;
}

.sub{
margin-top:4px;
font-size:14px;
color:var(--muted);
}

.links{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.link{
color:var(--primary);
font-weight:600;
text-decoration:none;
background:rgba(47,91,255,.10);
border:1px solid rgba(47,91,255,.18);
padding:9px 12px;
border-radius:999px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--r);
padding:20px;
box-shadow:var(--shadow);
}

label{
display:block;
margin-top:12px;
font-size:13px;
font-weight:700;
}

input,select,button{
width:100%;
padding:12px;
border-radius:12px;
margin-top:6px;
font-size:14px;
}

input,select{
border:1px solid var(--border);
background:transparent;
color:var(--text);
}

button{
border:none;
background:linear-gradient(180deg,var(--primary),#2449ff);
color:#fff;
font-weight:600;
cursor:pointer;
margin-top:14px;
}

.note{
margin-top:10px;
font-size:12.5px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">

<div>
<div class="brand">
<img class="brandLogo" src="/assets/flowpoint-logo.svg">
<h1>FlowPoint</h1>
</div>
<div class="sub">Essai gratuit 14 jours — carte requise. Accès bloqué si paiement échoue.</div>
</div>

<div class="links">
<a class="link" href="/pricing.html">Voir les offres</a>
<a class="link" href="/login.html">Se connecter</a>
</div>

</div>

<div class="card">

<form id="signupForm">

<label>Prénom</label>
<input type="text" placeholder="Jean">

<label>Email</label>
<input type="email" placeholder="jean@entreprise.com">

<label>Entreprise</label>
<input type="text" placeholder="Entreprise ABC">

<label>Offre</label>
<select>
<option>Standard</option>
<option selected>Pro</option>
<option>Ultra</option>
</select>

<button>Commencer l’essai</button>

<div class="note">
En continuant, tu acceptes que les emails d’alertes et rapports soient envoyés à ton équipe.
</div>

</form>

</div>

</div>

</body>
</html>
