<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FlowPoint — Essai 14 jours</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f7fb;
--card:rgba(255,255,255,.92);
--text:#0f172a;
--muted:#667085;
--border:#e6eaf2;
--primary:#2f5bff;
--shadow:0 10px 30px rgba(16,24,40,.06);
--r:16px;
}

@media (prefers-color-scheme: dark){
:root{
--bg:#070b18;
--card:rgba(12,18,40,.72);
--text:#e8eeff;
--muted:#aab7e1;
--border:rgba(255,255,255,.10);
}
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,-apple-system;
background:var(--bg);
color:var(--text);
}

.wrap{
max-width:860px;
margin:50px auto;
padding:0 16px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.brand h1{
margin:0;
font-size:26px;
font-weight:800;
}

.brand .sub{
margin-top:6px;
color:var(--muted);
font-size:14px;
}

.links a{
color:var(--primary);
font-weight:700;
text-decoration:none;
margin-left:12px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--r);
padding:20px;
box-shadow:var(--shadow);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

@media (max-width:720px){
.grid{grid-template-columns:1fr;}
}

label{
display:block;
margin-top:12px;
font-size:13px;
font-weight:600;
}

input,select,button{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--border);
margin-top:6px;
font-size:14px;
}

button{
border:none;
background:linear-gradient(180deg,var(--primary),#2449ff);
color:#fff;
font-weight:700;
cursor:pointer;
margin-top:14px;
}

#msg{
margin-top:12px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
<div class="brand">
<h1>FlowPoint</h1>
<div class="sub">Essai gratuit 14 jours</div>
</div>

<div class="links">
<a href="/pricing.html">Offres</a>
<a href="/login.html">Connexion</a>
</div>
</div>

<div class="card">

<form id="signupForm">

<div class="grid">

<div>
<label>Prénom</label>
<input id="firstName" placeholder="Jean">
</div>

<div>
<label>Email</label>
<input id="email" type="email" required>
</div>

</div>

<label>Entreprise</label>
<input id="companyName">

<label>Offre</label>

<select id="plan">
<option value="standard">Standard</option>
<option value="pro" selected>Pro</option>
<option value="ultra">Ultra</option>
</select>

<button id="btn" type="submit">
Commencer l’essai
</button>

<div id="msg"></div>

</form>

</div>

</div>

<script src="/app.js"></script>

</body>
</html>
