<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FlowPoint — Vérification</title>

  <link rel="icon" type="image/svg+xml" href="/assets/flowpoint-logo.svg" />
  <link rel="shortcut icon" href="/assets/flowpoint-logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f7fb;
      --card:rgba(255,255,255,.92);
      --text:#0f172a;
      --muted:#667085;
      --border:#e6eaf2;
      --primary:#2f5bff;
      --danger:#b00020;
      --success:#18a558;
      --shadow:0 16px 60px rgba(16,24,40,.10);
      --r:18px;
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg:#070b18;
        --card:rgba(14,18,40,.78);
        --text:#eaf0ff;
        --muted:rgba(234,240,255,.72);
        --border:rgba(255,255,255,.10);
        --shadow:0 24px 90px rgba(0,0,0,.45);
      }
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1000px 600px at 10% 0%, rgba(47,91,255,.18), transparent 55%),
        radial-gradient(1000px 600px at 90% 0%, rgba(99,102,241,.14), transparent 55%),
        var(--bg);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      color:var(--text);
    }

    .card{
      width:100%;
      max-width:560px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:22px;
      box-shadow:var(--shadow);
      backdrop-filter:saturate(180%) blur(14px);
    }

    .brandRow{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
    }

    .brandLogo{
      width:44px;
      height:44px;
      object-fit:contain;
      border-radius:12px;
      display:block;
      filter:drop-shadow(0 10px 22px rgba(0,0,0,.22));
    }

    h1{
      margin:10px 0 6px;
      font-size:20px;
      font-weight:700;
      letter-spacing:-.02em;
    }

    p{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:14px;
    }

    .msg{
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:13.5px;
      line-height:1.45;
    }

    @media (prefers-color-scheme: light){
      .msg{
        background:rgba(15,23,42,.04);
        border:1px solid rgba(15,23,42,.06);
      }
    }

    .msg.success{
      color:var(--success);
      font-weight:700;
    }

    .msg.error{
      color:var(--danger);
      font-weight:700;
    }

    .actions{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:0;
      min-height:44px;
      padding:0 16px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
    }

    .btnPrimary{
      background:linear-gradient(180deg,var(--primary),#2449ff);
      color:#fff;
    }

    .btnGhost{
      background:transparent;
      color:var(--text);
      border:1px solid var(--border);
    }

    .hidden{
      display:none !important;
    }

    .foot{
      margin-top:12px;
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="brandRow">
      <img class="brandLogo" src="/assets/flowpoint-logo.svg" alt="FlowPoint">
      <div style="color:var(--muted);font-size:13px;font-weight:600">
        Vérification sécurisée
      </div>
    </div>

    <h1 id="title">Connexion…</h1>
    <p id="desc">Validation de ton lien de connexion.</p>

    <div id="statusBox" class="msg">Vérification en cours…</div>

    <div class="actions">
      <a id="btnDashboard" class="btn btnPrimary hidden" href="/dashboard.html">Ouvrir le dashboard</a>
      <a id="btnLogin" class="btn btnGhost hidden" href="/login.html">Retour connexion</a>
      <button id="btnRetry" class="btn btnGhost hidden" type="button">Réessayer</button>
    </div>

    <div id="foot" class="foot"></div>
  </div>

  <script src="/login-verify.js"></script>
</body>
</html>
